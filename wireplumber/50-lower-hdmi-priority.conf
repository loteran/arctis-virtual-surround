monitor.alsa.rules = [
  {
    matches = [
      {
        # HDMI output — never auto-select as default
        node.name = "alsa_output.pci-0000_09_00.1.hdmi-surround"
      }
      {
        node.name = "alsa_output.pci-0000_09_00.1.hdmi-stereo"
      }
      {
        # C-Media USB DAC — low priority, always behind Arctis
        node.name = "alsa_output.usb-C-Media_Electronics_Inc._USB_Audio_Device-00.analog-stereo"
      }
    ]
    actions = {
      update-props = {
        priority.session = 200
      }
    }
  }
  {
    matches = [
      {
        # Arctis Nova Pro Wireless — high priority, always selected first
        node.name = "alsa_output.usb-SteelSeries_Arctis_Nova_Pro_Wireless-00.analog-stereo"
      }
    ]
    actions = {
      update-props = {
        priority.session = 1500
      }
    }
  }
]
